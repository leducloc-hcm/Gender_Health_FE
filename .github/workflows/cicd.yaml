name: CICD

on:
  push:
    branches:
      - main2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t react-app/reactjs-app .

      - name: Push Docker Image
        run: docker push react-app/reactjs-app:latest

  deploy:
    needs: build
    runs-on: aws-ec2
    steps:
      - name: Pull image from Docker Hub
        run: docker pull react-app/reactjs-app:latest

      - name: Delete Old Container
        run: docker rm -f reactContainer || true

      - name: Run docker container
        run: docker run -d -p 3000:80 --name reactContainer react-app/reactjs-app:latest
